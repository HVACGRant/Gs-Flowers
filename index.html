<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G's Flowers Inventory</title>

<!-- Boutique Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Playfair Display", serif;
        background: #F7DDE2;
        color: black;
        overflow-x: hidden;
        position: relative;
    }

    /* ---------------- WATERMARK ---------------- */
    #watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Great Vibes", cursive;
        font-size: 22rem;
        color: black;
        opacity: 0.06;
        pointer-events: none;
        user-select: none;
        z-index: 0;
    }

    /* ---------------- COVER SHEET ---------------- */

    #coverSheet {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #F7DDE2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        text-align: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
    }

    .cover-text {
        font-weight: 700;
        color: black;
        font-family: "Great Vibes", cursive;
    }

    /* Gaby — left, closer */
    .top-name {
        font-size: 3rem;
        align-self: flex-start;
        margin-left: 40px;
        margin-bottom: 10px; /* moved closer */
    }

    .top-name span {
        font-size: 6rem;
    }

    /* G’s Flowers — center */
    .middle-name {
        font-size: 5rem;
        align-self: center;
        margin: 0;
    }

    .middle-name span {
        font-size: 8rem;
    }

    /* Ginger — right, closer */
    .bottom-name {
        font-size: 3rem;
        align-self: flex-end;
        margin-right: 40px;
        margin-top: 10px; /* moved closer */
    }

    .bottom-name span {
        font-size: 6rem;
    }

    #nextBtn {
        margin-top: 40px;
        margin-bottom: 180px;
        padding: 12px 28px;
        background: black;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.4rem;
        cursor: pointer;
        transition: 0.3s;
    }

    #nextBtn:hover {
        background: #444;
    }

    /* ---------------- INVENTORY PAGE ---------------- */

    #inventoryPage {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease;
        padding: 20px;
        position: relative;
        z-index: 2;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 3.2rem;
        font-family: "Great Vibes", cursive;
        font-weight: 400;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 12px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        padding-right: 20px;
        text-align: left;
        font-size: 1.2rem;
        color: black;
    }

    th {
        background: rgba(0, 0, 0, 0.1);
        font-weight: 700;
    }

    tr:nth-child(even) {
        background: rgba(0, 0, 0, 0.05);
    }

    tr:nth-child(odd) {
        background: rgba(0, 0, 0, 0.02);
    }

    input, select {
        width: 100%;
        padding: 6px;
        font-size: 1rem;
        border: 1px solid #999;
        border-radius: 6px;
        outline: none;
        background: white;
        color: black;
    }

    .small-input {
        width: 70px;
    }

    .description-wrapper {
        position: relative;
        padding-right: 12px;
    }

    .description-input {
        width: 100%;
        padding-right: 28px;
        white-space: normal;
        overflow-wrap: break-word;
        word-wrap: break-word;
    }

    .notes-icon {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        opacity: 0.5;
        cursor: pointer;
        transition: 0.2s;
    }

    .notes-icon.active {
        color: black;
        opacity: 1;
    }

    .toggle {
        width: 60px;
        height: 30px;
        position: relative;
        display: inline-block;
    }

    .toggle input {
        display: none;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        background-color: #ccc;
        border-radius: 30px;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        transition: .3s;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 24px;
        width: 24px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: .3s;
    }

    input:checked + .slider {
        background-color: black;
    }

    input:checked + .slider:before {
        transform: translateX(30px);
    }

    #resetPageBtn {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 8px 14px;
        background: black;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        z-index: 10;
    }

    .sold-row {
        background: rgba(0, 0, 0, 0.15) !important;
        transition: 0.25s;
    }

    .sold-badge {
        display: inline-block;
        padding: 4px 10px;
        background: black;
        color: white;
        font-size: 0.9rem;
        font-weight: 700;
        border-radius: 6px;
        margin-left: 10px;
        opacity: 0;
        transform: translateY(-2px);
        transition: 0.25s ease;
    }

    .sold-row .sold-badge {
        opacity: 1;
    }

    #footerSignature {
        text-align: center;
        margin-top: 30px;
        font-size: 1.2rem;
        opacity: 0.7;
        letter-spacing: 1px;
        font-family: "Playfair Display", serif;
    }
</style>
</head>
<body>

<!-- WATERMARK -->
<div id="watermark">G</div>

<!-- ---------------- COVER SHEET ---------------- -->

<div id="coverSheet">

    <div class="cover-text top-name">
        <span>G</span>aby
    </div>

    <div class="cover-text middle-name">
        <span>G</span>'s Flowers
    </div>

    <div class="cover-text bottom-name">
        <span>G</span>inger
    </div>

    <button id="nextBtn">Next</button>
</div>

<!-- ---------------- INVENTORY PAGE ---------------- -->

<div id="inventoryPage">

<button id="resetPageBtn">Reset Page</button>

<h1>Inventory</h1>

<table id="inventoryTable">
    <tr>
        <th>Name</th>
        <th>Quantity</th>
        <th>Description</th>
        <th>Price</th>
        <th>Cash/App</th>
        <th>Sold</th>
        <th>Inventory Cost</th>
        <th>Profit</th>
        <th></th>
    </tr>
</table>

<div id="footerSignature">Designed by Danny</div>

</div>

                       border:none; border-radius:6px; cursor:pointer;">
            Delete Notes
