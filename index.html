
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G's Flowers Inventory</title>

<!-- Boutique Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Playfair Display", serif;
        background: #F7DDE2;
        color: black;
        overflow-x: hidden;
        position: relative;
    }

    #watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Great Vibes", cursive;
        font-size: 22rem;
        color: black;
        opacity: 0.06;
        pointer-events: none;
        user-select: none;
        z-index: 0;
    }

    /* COVER SHEET */
    #coverSheet {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #F7DDE2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        text-align: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
    }

    .cover-text {
        font-weight: 700;
        color: black;
        font-family: "Great Vibes", cursive;
    }

    .top-name {
        font-size: 3rem;
        align-self: flex-start;
        margin-left: 40px;
        margin-bottom: 10px;
    }
    .top-name span { font-size: 6rem; }

    .middle-name {
        font-size: 5rem;
        align-self: center;
        margin: 0;
    }
    .middle-name span { font-size: 8rem; }

    .bottom-name {
        font-size: 3rem;
        align-self: flex-end;
        margin-right: 40px;
        margin-top: 10px;
    }
    .bottom-name span { font-size: 6rem; }

    #nextBtn {
        margin-top: 40px;
        margin-bottom: 180px;
        padding: 12px 28px;
        background: black;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.4rem;
        cursor: pointer;
    }

    /* INVENTORY PAGE */
    #inventoryPage {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease;
        padding: 20px;
        position: relative;
        z-index: 2;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 3.2rem;
        font-family: "Great Vibes", cursive;
        font-weight: 400;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 12px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        padding-right: 20px;
        text-align: left;
        font-size: 1.2rem;
        color: black;
    }

    th {
        background: rgba(0, 0, 0, 0.1);
        font-weight: 700;
    }

    tr:nth-child(even) { background: rgba(0, 0, 0, 0.05); }
    tr:nth-child(odd) { background: rgba(0, 0, 0, 0.02); }

    input, select {
        width: 100%;
        padding: 6px;
        font-size: 1rem;
        border: 1px solid #999;
        border-radius: 6px;
        background: white;
        color: black;
    }

    .small-input { width: 70px; }

    .description-wrapper {
        position: relative;
        padding-right: 12px;
    }

    .notes-icon {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        opacity: 0.4;
        transition: 0.2s;
    }

    .notes-icon.active {
        opacity: 1;
        color: black;
    }

    /* SOLD BADGE */
    .sold-badge {
        opacity: 0;
        transition: 0.3s ease;
        font-weight: bold;
        color: red;
    }

    .sold-row {
        background: rgba(255, 0, 0, 0.08) !important;
    }

    /* NOTES POPUP */
    #notesPopup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 300px;
        z-index: 99999;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    #notesArea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #aaa;
        resize: none;
    }

    #closeNotes, #deleteNotes {
        margin-top: 10px;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    #closeNotes { background: black; color: white; }
    #deleteNotes { background: red; color: white; }

    /* RESET BUTTON */
    #resetPageBtn {
        margin-top: 20px;
        padding: 10px 20px;
        background: black;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
    }
</style>
</head>

<body>

<div id="watermark">G</div>

<!-- COVER SHEET -->
<div id="coverSheet">
    <div class="top-name cover-text">G’s <span>Flowers</span></div>
    <div class="middle-name cover-text">Inventory <span>Tool</span></div>
    <div class="bottom-name cover-text">By <span>Danny</span></div>
    <button id="nextBtn">Enter</button>
</div>

<!-- INVENTORY PAGE -->
<div id="inventoryPage">
    <h1>G’s Flowers Inventory</h1>

    <table id="inventoryTable">
        <tr>
            <th>Name</th>
            <th>Qty</th>
            <th>Description</th>
            <th>Price</th>
            <th>Cash/App</th>
            <th>Sold</th>
            <th></th>
            <th></th>
            <th>Status</th>
        </tr>

        <!-- Totals Row -->
        <tr id="totalsRow">
            <td colspan="3"></td>
            <td><input id="totalInventoryCost" type="text" readonly></td>
            <td><input id="totalProfit" type="text" readonly></td>
            <td colspan="4"></td>
        </tr>
    </table>

    <button id="resetPageBtn">Reset Page</button>
</div>

<!-- NOTES POPUP -->
<div id="notesPopup">
    <textarea id="notesArea"></textarea>
    <button id="closeNotes">Save</button>
    <button id="deleteNotes">Delete</button>
</div>

<script>
/* COVER SHEET LOGIC */
document.getElementById("nextBtn").addEventListener("click", function() {
    document.getElementById("coverSheet").style.opacity = "0";
    setTimeout(() => {
        document.getElementById("coverSheet").style.display = "none";
        const page = document.getElementById("inventoryPage");
        page.style.opacity = "1";
        page.style.pointerEvents = "auto";
    }, 800);
});

/* NOTES HANDLING */
let activeNotesInput = null;

/* SAVE */
function saveData() {
    const rows = [];
    document.querySelectorAll("#inventoryTable tr").forEach((tr, index) => {
        if (index <= 1) return;

        const cells = tr.querySelectorAll("td");

        rows.push({
            name: cells[0].querySelector("input")?.value || "",
            quantity: cells[1].querySelector("input")?.value || "",
            description: cells[2].querySelector("input")?.value || "",
            price: cells[3].querySelector("input")?.value || "",
            cashapp: cells[4].querySelector("select")?.value || "",
            sold: cells[5].querySelector("input")?.checked || false
        });
    });

    localStorage.setItem("inventoryData", JSON.stringify(rows));
}

/* ADD ROW */
function addRow(data = {}) {
    const table = document.getElementById("inventoryTable");
    const totalsRow = document.getElementById("totalsRow");
    const newRow = table.insertRow(totalsRow.rowIndex + 1);

    newRow.innerHTML = `
        <td><input type="text" value="${data.name || ""}"></td>
        <td><input type="number" class="small-input quantity" value="${data.quantity || ""}"></td>
        <td>
            <div class="description-wrapper">
                <input type="text" class="description-input" value="${data.description || ""}">
                <span class="notes-icon">📝</span>
            </div>
        </td>
        <td><input type="number" step="0.01" class="small-input price" value="${data.price || ""}"></td>

        <td>
            <select class="cashapp-select">
                <option value="">—</option>
                <option value="Cash" ${data.cashapp === "Cash" ? "selected" : ""}>Cash</option>
                <option value="App" ${data.cashapp === "App" ? "selected" : ""}>App</option>
            </select>
        </td>

        <td>
            <label class="toggle">
                <input type="checkbox" class="sold-toggle" ${data.sold ? "checked" : ""}>
                <span class="slider"></span>
            </label>
        </td>

        <td></td>
        <td></td>
        <td><span class="sold-badge">SOLD</span></td>
    `;

    if (data.sold) {
        newRow.classList.add("sold-row");
        newRow.querySelector(".sold-badge").style.opacity = "1";
    }
}

/* LOAD */
function loadData() {
    const saved = localStorage.getItem("inventoryData");

    if (saved) {
        JSON.parse(saved).forEach(data => addRow(data));
    } else {
        addRow();
    }

    updateTotals();
}

/* INITIAL LOAD */
loadData();

/* NAVIGATION */
document.getElementById("inventoryTable").addEventListener("keydown", function(e) {
    const currentInput = e.target;
    if (!currentInput.closest("tr")) return;

    const row = currentInput.closest("tr");
    const inputs = Array.from(row.querySelectorAll("input:not(.sold-toggle), select"));
    const index = inputs.indexOf(currentInput);

    if (e.key === "Enter" || e.key === "Tab") {
        e.preventDefault();

        if (index === inputs.length - 1) {
            addRow();
            saveData();
        } else {
            inputs[index + 1].focus();
        }
    }
});

/* TOTALS CALCULATION */
function updateTotals() {
    let totalInventory = 0;
    let totalProfit = 0;

    document.querySelectorAll("#inventoryTable tr").forEach((tr, index) => {
        if (index <= 1) return;

        const price = parseFloat(tr.querySelector(".price")?.value || 0);
        const quantity = parseFloat(tr.querySelector(".quantity")?.value || 0);
        const sold = tr.querySelector(".sold-toggle")?.checked;

        if (sold) {
            totalProfit += price * quantity;
        } else {
            totalInventory += price * quantity;
        }
    });

    document.getElementById("totalInventoryCost").value = totalInventory.toFixed(2);
    document.getElementById("totalProfit").value = totalProfit.toFixed(2);
}

/* INPUT LISTENER */
document.getElementById("inventoryTable").addEventListener("input", function(e) {
    const row = e.target.closest("tr");
    if (!row) return;

    const sold = row.querySelector(".sold-toggle")?.checked;
    const badge = row.querySelector(".sold-badge");

    if (sold) {
        row.classList.add("sold-row");
        badge.style.opacity = "1";
    } else {
        row.classList.remove("sold-row");
        badge.style.opacity = "0";
    }

    updateTotals();
    saveData();
});

/* NOTES POPUP */
document.addEventListener("click", function(e) {
    if (e.target.classList.contains("notes-icon")) {
        const wrapper = e.target.closest(".description-wrapper");
        activeNotesInput = wrapper.querySelector(".description-input");

        document.getElementById("notesArea").value = activeNotesInput.value;
        document.getElementById("notesPopup").style.display = "block";
    }
});

document.getElementById("closeNotes").addEventListener("click", function() {
    if (activeNotesInput) {
        activeNotesInput.value = document.getElementById("notesArea").value;

        const icon = activeNotesInput.closest(".description-wrapper").querySelector(".notes-icon");
        icon.classList.toggle("active", activeNotesInput.value.trim() !== "");
    }

    document.getElementById("notesPopup").style.display = "none";
    saveData();
});

document.getElementById("deleteNotes").addEventListener("click", function() {
    if (activeNotesInput) {
        activeNotesInput.value = "";
        document.getElementById("notesArea").value = "";

        const icon = activeNotesInput.closest(".description-wrapper").querySelector(".notes-icon");
        icon.classList.remove("active");
    }

    saveData();
});

/* RESET */
document.getElementById("resetPageBtn").addEventListener("click", function() {
    if (confirm("Clear the table but keep saved data?")) {
        document.querySelectorAll("#inventoryTable tr").forEach((row, index) => {
            if (index > 1) row.remove();
        });
        addRow();
        updateTotals();
    }
});
</script>

</body>
</html>
