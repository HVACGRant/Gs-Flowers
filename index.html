<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G's Flowers Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Playfair Display", serif;
      background: #f9e3ea;
      color: #000;
      overflow-x: hidden;
    }

    /* ---------------- COVER SHEET ---------------- */
    #coverSheet {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #f9e3ea;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 1;
      transition: opacity 1.2s ease;
    }

    .cover-text {
      font-family: "Great Vibes", cursive;
      text-align: center;
      color: #000;
      margin: 12px 0;
    }

    .cover-gaby {
      font-size: 48px;
    }

    .cover-gsflowers {
      font-size: 72px;
    }

    .cover-ginger {
      font-size: 48px;
    }

    #enterBtn {
      margin-top: 40px;
      padding: 10px 24px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 18px;
      cursor: pointer;
      font-family: "Playfair Display", serif;
    }

    #enterBtn:hover {
      background: #333;
    }

    /* ---------------- TOTALS BAR ---------------- */
    .totals-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
      z-index: 1000;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .total-item {
      flex: 1;
      text-align: center;
      padding: 4px 8px;
    }

    .total-label {
      font-family: "Great Vibes", cursive;
      font-size: 18px;
      display: block;
    }

    .total-value {
      font-size: 16px;
      font-weight: 600;
    }

    /* ---------------- CONTENT ---------------- */
    .content {
      padding: 100px 16px 24px;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      font-size: 13px;
      text-align: center;
    }

    th {
      background: #f5c9d6;
      position: sticky;
      top: 80px;
      z-index: 500;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 2px 4px;
      font-size: 12px;
    }

    .small-input {
      max-width: 80px;
    }

    .checkbox-cell input {
      transform: scale(1.1);
    }

    .add-row-btn {
      margin-top: 8px;
      padding: 6px 12px;
      border: none;
      background: #000;
      color: #fff;
      cursor: pointer;
      font-family: "Playfair Display", serif;
      font-size: 13px;
    }

    .add-row-btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- ---------------- COVER SHEET ---------------- -->
  <div id="coverSheet">
    <div class="cover-text cover-gaby">Gaby</div>
    <div class="cover-text cover-gsflowers">G’s Flowers</div>
    <div class="cover-text cover-ginger">Ginger</div>
    <button id="enterBtn">Enter</button>
  </div>

  <!-- ---------------- TOTALS BAR ---------------- -->
  <div class="totals-bar" id="totalsBar">
    <div class="total-item"><span class="total-label">Inventory Cost</span><span class="total-value" id="inventoryCostTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">Profit</span><span class="total-value" id="profitTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">Cash</span><span class="total-value" id="cashTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">App</span><span class="total-value" id="appTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">App Taxes</span><span class="total-value" id="appTaxTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">Gaby</span><span class="total-value" id="gabyTotal">$0.00</span></div>
    <div class="total-item"><span class="total-label">Ginger</span><span class="total-value" id="gingerTotal">$0.00</span></div>
  </div>

  <!-- ---------------- MAIN CONTENT ---------------- -->
  <div class="content" id="contentArea">
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Initials</th>
          <th>Description</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Sold</th>
          <th>Cash/App</th>
          <th>App Tax</th>
        </tr>
      </thead>

      <tbody id="inventoryBody">
        <tr>
          <td>
            <select class="name-select">
              <option value="">_</option>
              <option value="Gaby">Gaby</option>
              <option value="Ginger">Ginger</option>
            </select>
          </td>

          <td>
            <select class="initials-select small-input">
              <option value="">_</option>
              <option value="GMG">GMG</option>
              <option value="GC">GC</option>
            </select>
          </td>

          <td><input type="text" class="desc-input"></td>
          <td><input type="number" class="qty-input small-input" min="0" value="0"></td>
          <td><input type="number" class="price-input small-input" min="0" step="0.01" value="0.00"></td>

          <td class="checkbox-cell">
            <input type="checkbox" class="sold-checkbox">
          </td>

          <td>
            <select class="cashapp-select small-input">
              <option value="">_</option>
              <option value="Cash">Cash</option>
              <option value="App">App</option>
            </select>
          </td>

          <td class="app-tax-cell">$0.00</td>
        </tr>
      </tbody>
    </table>

    <button class="add-row-btn" id="addRowBtn">+ Add Row</button>
  </div>

  <!-- ---------------- SCRIPT ---------------- -->
  <script>
    /* Fade-out cover sheet, fade-in totals + content */
    document.getElementById("enterBtn").addEventListener("click", () => {
      const cover = document.getElementById("coverSheet");
      const totals = document.getElementById("totalsBar");
      const content = document.getElementById("contentArea");

      cover.style.opacity = "0";

      setTimeout(() => {
        cover.style.display = "none";
        totals.style.opacity = "1";
        content.style.opacity = "1";
      }, 1200);
    });

    /* Utility */
    function parseNumber(v) {
      const n = parseFloat(v);
      return isNaN(n) ? 0 : n;
    }

    function formatMoney(v) {
      return "$" + v.toFixed(2);
    }

    /* Recalculate totals */
    function recalc() {
      const rows = [...document.querySelectorAll("#inventoryBody tr")];

      let inv = 0, profit = 0, cash = 0, app = 0, appTaxTotal = 0, gaby = 0, ginger = 0;

      rows.forEach(row => {
        const name = row.querySelector(".name-select").value;
        const qty = parseNumber(row.querySelector(".qty-input").value);
        const price = parseNumber(row.querySelector(".price-input").value);
        const sold = row.querySelector(".sold-checkbox").checked;
        const cashapp = row.querySelector(".cashapp-select").value;

        const line = qty * price;
        let appTax = 0;

        if (!sold) inv += line;
        if (sold) profit += line;

        if (cashapp === "Cash") cash += line;
        if (cashapp === "App") {
          app += line;
          appTax = line * 1.025 + 0.15;
          appTaxTotal += appTax;
        }

        if (name === "Gaby") gaby += line;
        if (name === "Ginger") ginger += line;

        row.querySelector(".app-tax-cell").textContent = formatMoney(appTax);
      });

      document.getElementById("inventoryCostTotal").textContent = formatMoney(inv);
      document.getElementById("profitTotal").textContent = formatMoney(profit);
      document.getElementById("cashTotal").textContent = formatMoney(cash);
      document.getElementById("appTotal").textContent = formatMoney(app);
      document.getElementById("appTaxTotal").textContent = formatMoney(appTaxTotal);
      document.getElementById("gabyTotal").textContent = formatMoney(gaby);
      document.getElementById("gingerTotal").textContent = formatMoney(ginger);
    }

    /* Auto-advance after Sold */
    function autoAdvance(row) {
      const rows = [...document.querySelectorAll("#inventoryBody tr")];
      const idx = rows.indexOf(row);

      if (rows[idx + 1]) {
        rows[idx + 1].querySelector(".name-select").focus();
      } else {
        const newRow = addRow();
        newRow.querySelector(".name-select").focus();
      }
    }

    /* Add row */
    function addRow() {
      const tbody = document.getElementById("inventoryBody");
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>
          <select class="name-select">
            <option value="">_</option>
            <option value="Gaby">Gaby</option>
            <option value="Ginger">Ginger</option>
          </select>
        </td>
        <td>
          <select class="initials-select small-input">
            <option value="">_</option>
            <option value="GMG">GMG</option>
            <option value="GC">GC</option>
          </select>
        </td>
        <td><input type="text" class="desc-input"></td>
        <td><input type="number" class="qty-input small-input" min="0" value="0"></td>
        <td><input type="number" class="price-input small-input" min="0" step="0.01" value="0.00"></td>
        <td class="checkbox-cell"><input type="checkbox" class="sold-checkbox"></td>
        <td>
          <select class="cashapp-select small-input">
            <option value="">_</option>
            <option value="Cash">Cash</option>
            <option value="App">App</option>
          </select>
        </td>
        <td class="app-tax-cell">$0.00</td>
      `;

      tbody.appendChild(tr);
      wireRow(tr);
      recalc();
      return tr;
    }

    /* Wire row events */
    function wireRow(row) {
      row.querySelectorAll("input, select").forEach(el => {
        el.addEventListener("input", recalc);
        el.addEventListener("change", recalc);
      });

      row.querySelector(".sold-checkbox").addEventListener("change", e => {
        recalc();
        if (e.target.checked) autoAdvance(row);
      });
    }

    /* Init */
    document.addEventListener("DOMContentLoaded", () => {
      wireRow(document.querySelector("#inventoryBody tr"));
      document.getElementById("addRowBtn").addEventListener("click", addRow);
      recalc();
    });
  </script>

</body>
</html>
